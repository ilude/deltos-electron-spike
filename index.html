<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Deltos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-sidebar: #252526;
      --bg-editor: #1e1e1e;
      --bg-titlebar: #323233;
      --bg-tab-active: #1e1e1e;
      --bg-tab-inactive: #2d2d2d;
      --bg-terminal: #1e1e1e;
      --bg-panel-header: #252526;
      --bg-statusbar: #007acc;
      --bg-activitybar: #333333;
      --bg-input: #3c3c3c;
      --border: #3e3e42;
      --text: #cccccc;
      --text-dim: #858585;
      --text-bright: #e0e0e0;
      --accent: #007acc;
      --icon-active: #ffffff;
      --icon-inactive: #858585;
      --hover: #2a2d2e;
      --selected: #094771;
      --scrollbar: #424242;
      --scrollbar-hover: #4f4f4f;
      --terminal-green: #4ec9b0;
      --terminal-cursor: #aeafad;
      --font-mono: 'Consolas', 'Courier New', monospace;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text);
      background: var(--bg-editor);
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-rows: 30px 1fr 22px;
      grid-template-columns: 48px 1fr;
      grid-template-areas:
        "titlebar titlebar"
        "activitybar main"
        "statusbar statusbar";
      height: 100vh;
    }

    /* ── Title Bar ── */
    .titlebar {
      grid-area: titlebar;
      background: var(--bg-titlebar);
      display: flex;
      align-items: center;
      padding: 0 12px;
      -webkit-app-region: drag;
      user-select: none;
      font-size: 12px;
      color: var(--text-dim);
    }
    .titlebar span { margin: 0 auto; }

    /* ── Activity Bar ── */
    .activitybar {
      grid-area: activitybar;
      background: var(--bg-activitybar);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 4px;
      border-right: 1px solid var(--border);
    }
    .activitybar-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--icon-inactive);
      position: relative;
      font-size: 20px;
    }
    .activitybar-icon:hover { color: var(--icon-active); }
    .activitybar-icon.active {
      color: var(--icon-active);
    }
    .activitybar-icon.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--icon-active);
    }

    /* ── Main Area ── */
    .main {
      grid-area: main;
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 1fr;
      overflow: hidden;
    }
    .main.sidebar-collapsed {
      grid-template-columns: 0px 1fr;
    }

    /* ── Sidebar / Explorer ── */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .main.sidebar-collapsed .sidebar {
      display: none;
    }
    .sidebar-header {
      padding: 10px 20px 10px 20px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header-actions {
      display: flex;
      gap: 4px;
    }
    .sidebar-header-actions button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 2px;
      line-height: 1;
    }
    .sidebar-header-actions button:hover { color: var(--icon-active); }

    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .tree-item {
      display: flex;
      align-items: center;
      padding: 2px 8px 2px 0;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      height: 22px;
      font-size: 13px;
    }
    .tree-item:hover { background: var(--hover); }
    .tree-item.selected { background: var(--selected); }
    .tree-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-dim);
    }
    .tree-label { margin-left: 4px; }
    .tree-item.folder > .tree-label { color: var(--text-bright); }
    .tree-item.file > .tree-label { color: var(--text); }
    .tree-children { display: none; }
    .tree-children.open { display: block; }

    /* File type colors */
    .file-ts { color: #519aba; }
    .file-js { color: #cbcb41; }
    .file-json { color: #cbcb41; }
    .file-md { color: #519aba; }
    .file-html { color: #e37933; }
    .file-css { color: #563d7c; }
    .file-svg { color: #a074c4; }
    .file-git { color: #e64d3d; }

    /* ── Editor Area ── */
    .editor-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      background: var(--bg-tab-inactive);
      height: 35px;
      overflow-x: auto;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-bar::-webkit-scrollbar { height: 3px; }
    .tab-bar::-webkit-scrollbar-thumb { background: var(--scrollbar); }

    .tab {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 100%;
      cursor: pointer;
      border-right: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 0;
      position: relative;
      background: var(--bg-tab-inactive);
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--bg-tab-active);
      color: var(--text-bright);
    }
    .tab.active::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
    }
    .tab-icon {
      margin-right: 6px;
      font-size: 12px;
    }
    .tab-close {
      margin-left: 8px;
      font-size: 14px;
      color: transparent;
      cursor: pointer;
      border-radius: 3px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .tab:hover .tab-close { color: var(--text-dim); }
    .tab-close:hover { background: rgba(255,255,255,0.1); color: var(--text-bright) !important; }
    .tab.modified .tab-close { color: var(--text-dim); }
    .tab.modified .tab-close::before { content: '●'; font-size: 10px; }

    /* Editor Content */
    .editor-content {
      flex: 1;
      overflow: auto;
      position: relative;
    }
    .editor-pane {
      display: none;
      height: 100%;
    }
    .editor-pane.active { display: flex; }

    .line-numbers {
      padding: 8px 0;
      text-align: right;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 20px;
      min-width: 50px;
      padding-right: 16px;
      padding-left: 16px;
      user-select: none;
      flex-shrink: 0;
      white-space: pre;
    }
    .code-area {
      flex: 1;
      padding: 8px 16px 8px 0;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 20px;
      overflow-x: auto;
      white-space: pre;
      color: var(--text);
    }

    /* Syntax colors */
    .syn-keyword { color: #569cd6; }
    .syn-string { color: #ce9178; }
    .syn-comment { color: #6a9955; }
    .syn-function { color: #dcdcaa; }
    .syn-type { color: #4ec9b0; }
    .syn-number { color: #b5cea8; }
    .syn-tag { color: #569cd6; }
    .syn-attr { color: #9cdcfe; }
    .syn-punct { color: #808080; }

    /* Welcome tab */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
    }
    .welcome h2 {
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 8px;
      color: var(--text);
    }
    .welcome p { font-size: 13px; }

    /* ── Panel (Terminal) ── */
    .panel-container {
      display: none;
      flex-direction: column;
      border-top: 1px solid var(--border);
    }
    .panel-container.open {
      display: flex;
      height: 200px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      background: var(--bg-panel-header);
      height: 35px;
      padding: 0 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .panel-tabs {
      display: flex;
      gap: 0;
      height: 100%;
    }
    .panel-tab {
      padding: 0 12px;
      height: 100%;
      display: flex;
      align-items: center;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
    }
    .panel-tab:hover { color: var(--text); }
    .panel-tab.active {
      color: var(--text-bright);
      border-bottom-color: var(--accent);
    }
    .panel-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }
    .panel-actions button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
    }
    .panel-actions button:hover { color: var(--icon-active); }

    .terminal {
      flex: 1;
      background: var(--bg-terminal);
      padding: 8px 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 20px;
      overflow-y: auto;
      color: var(--text);
    }
    .term-prompt { color: var(--terminal-green); }
    .term-path { color: #569cd6; }
    .term-dim { color: var(--text-dim); }
    .terminal-cursor {
      display: inline-block;
      width: 7px;
      height: 15px;
      background: var(--terminal-cursor);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Resize Handle ── */
    .resize-handle {
      height: 4px;
      cursor: ns-resize;
      background: transparent;
      flex-shrink: 0;
    }
    .resize-handle:hover { background: var(--accent); }

    /* ── Status Bar ── */
    .statusbar {
      grid-area: statusbar;
      background: var(--bg-statusbar);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      color: #fff;
      justify-content: space-between;
    }
    .statusbar-left, .statusbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .status-item {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-item:hover { background: rgba(255,255,255,0.12); padding: 0 4px; margin: 0 -4px; }

    /* ── Scrollbar Styling ── */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }
    ::-webkit-scrollbar-corner { background: transparent; }

    /* ── Breadcrumb ── */
    .breadcrumb {
      padding: 2px 12px;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg-tab-active);
      border-bottom: 1px solid var(--border);
      display: none;
      align-items: center;
      gap: 4px;
    }
    .breadcrumb.visible { display: flex; }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: var(--text); }
    .breadcrumb .sep { color: var(--text-dim); font-size: 10px; }

    /* ── Minimap placeholder ── */
    .minimap {
      width: 60px;
      flex-shrink: 0;
      background: var(--bg-editor);
      opacity: 0.4;
      overflow: hidden;
      padding: 8px 4px;
      font-size: 2px;
      line-height: 3px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Title Bar -->
    <div class="titlebar">
      <span>Deltos</span>
    </div>

    <!-- Activity Bar -->
    <div class="activitybar">
      <div class="activitybar-icon active" data-panel="explorer" title="Explorer">&#128462;</div>
      <div class="activitybar-icon" data-panel="search" title="Search">&#128269;</div>
      <div class="activitybar-icon" data-panel="git" title="Source Control">&#9891;</div>
      <div class="activitybar-icon" data-panel="debug" title="Run & Debug">&#9654;</div>
      <div class="activitybar-icon" data-panel="extensions" title="Extensions">&#9638;</div>
    </div>

    <!-- Main Content -->
    <div class="main" id="main">
      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span>Explorer</span>
          <div class="sidebar-header-actions">
            <button title="New File">+</button>
            <button title="Collapse All">&#8722;</button>
          </div>
        </div>
        <div class="file-tree" id="fileTree"></div>
      </div>

      <!-- Editor Area -->
      <div class="editor-area">
        <div class="tab-bar" id="tabBar"></div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="editor-content" id="editorContent">
          <!-- Welcome pane (default) -->
          <div class="editor-pane active" data-file="welcome">
            <div class="welcome">
              <h2>Deltos</h2>
              <p>Open a file from the explorer to get started.</p>
            </div>
          </div>
        </div>

        <!-- Terminal Panel -->
        <div class="panel-container" id="panelContainer">
          <div class="resize-handle" id="resizeHandle"></div>
          <div class="panel-header">
            <div class="panel-tabs">
              <div class="panel-tab active">Terminal</div>
              <div class="panel-tab">Problems</div>
              <div class="panel-tab">Output</div>
            </div>
            <div class="panel-actions">
              <button title="New Terminal">+</button>
              <button title="Close Panel" id="closePanelBtn">&times;</button>
            </div>
          </div>
          <div class="terminal" id="terminal">
            <div><span class="term-prompt">mglenn@deltos</span> <span class="term-path">~/projects/deltos</span> <span class="term-dim">$</span> <span class="terminal-cursor"></span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="statusbar">
      <div class="statusbar-left">
        <div class="status-item" id="branchStatus">&#9891; main</div>
        <div class="status-item">0 &#9888; 0 &#9432;</div>
      </div>
      <div class="statusbar-right">
        <div class="status-item">Ln 1, Col 1</div>
        <div class="status-item">Spaces: 2</div>
        <div class="status-item">UTF-8</div>
        <div class="status-item">TypeScript</div>
        <div class="status-item" id="toggleTerminal" style="cursor:pointer;">&#9638; Terminal</div>
      </div>
    </div>
  </div>

  <script src="dist/renderer.js"></script>
</body>
</html>
